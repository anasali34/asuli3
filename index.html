<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <style>
        .profile-card {
            border: 2px solid #ff6347;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            background-color: #fffaf0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .food-score {
            color: #d2691e;
            font-weight: bold;
            font-size: 1.2em;
        }
        .tag {
            background-color: #ff6347;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin: 5px;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>ئاسیا 👩‍🍳</h2>
    <p>پسپۆڕی ناسینی تامی خواردن</p>
    
    <div>
        <span class="tag">🍕 پیتزا</span>
        <span class="tag">🍣 سوشی</span>
        <span class="tag">🥩 ستیک</span>
    </div>

    <p>ئاستی چێژوەرگرتن: <span class="food-score">100/100</span></p>
    <p>دروشم: "خواردنی باش، ژیانی باش!"</p>
</div>

</body>
</html>
